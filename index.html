<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <title>User Posts</title>
</head>

<body>
  <div class="container">
    <header class="page-header">
      <p class="page-header__eyebrow">Directory</p>
      <h1 class="page-header__title">Choose a User</h1>
      <p class="page-header__subtitle">Search the team directory and open any profile to view their posts.</p>
    </header>

    <section class="toolbar" aria-label="User filters">
      <label class="toolbar__label" for="user-search">Find by name or email</label>
      <input
        id="user-search"
        class="toolbar__input"
        type="search"
        placeholder="Try Leanne or @biz"
        autocomplete="off"
      />
      <p id="user-search-status" class="toolbar__status" aria-live="polite"></p>
    </section>

    <div
      class="user-list"
      id="user-list"
      role="status"
      aria-live="polite"
      aria-busy="false"
    ></div>
  </div>
</body>
<script src="index.js"></script>

</html>

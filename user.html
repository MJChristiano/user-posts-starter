<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Posts</title>
    <link rel="stylesheet" href="index.css" />
  </head>

  <body>
    <div class="container">
      <header class="post-page-header">
        <a class="back-btn" href="./index.html">← Back</a>
        <h1 class="post-page-header__title">Post Explorer</h1>
        <p class="post-page-header__subtitle">
          Browse, filter, and sort posts by any user ID.
        </p>
      </header>

      <section class="post__search" aria-label="Post controls">
        <div class="post__search--container">
          <label class="post__search--label" for="search-input">User ID</label>
          <input
            id="search-input"
            type="number"
            min="1"
            max="10"
            placeholder="1"
            aria-describedby="search-input-message"
            inputmode="numeric"
          />
          <p
            id="search-input-message"
            class="post__search--message"
            aria-live="polite"
          ></p>
        </div>

        <div class="post__search--container">
          <label class="post__search--label" for="post-filter-input">Filter posts</label>
          <input
            id="post-filter-input"
            type="search"
            placeholder="Search title or body"
            autocomplete="off"
          />
        </div>

        <div class="post__search--container">
          <label class="post__search--label" for="sort-select">Sort by</label>
          <select id="sort-select" class="post__search--select">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="title">Title A-Z</option>
          </select>
        </div>
      </section>

      <p id="post-summary" class="post__summary" aria-live="polite"></p>

      <div
        class="post-list"
        id="post-list"
        role="status"
        aria-live="polite"
        aria-busy="false"
      ></div>
    </div>
  </body>
  <script src="user.js"></script>
</html>
